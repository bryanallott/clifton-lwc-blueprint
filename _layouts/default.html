<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/assets/images/favicon.svg">
  <link rel="shortcut icon" href="{{ site.baseurl }}/assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-logos">
      <div class="header-logo-slot">
        <img src="{{ site.baseurl }}/assets/images/clifton-logo.png" alt="Clifton Surf Lifesaving Club">
      </div>
      <div class="header-logo-slot center">
        <img src="{{ site.baseurl }}/assets/images/lwc-2026.png" alt="Lifesaving World Championships 2026 – Port Elizabeth">
      </div>
      <div class="header-logo-slot">
        <img src="{{ site.baseurl }}/assets/images/macassar-logo.png" alt="Macassar Surf Lifesaving Club">
      </div>
    </div>
    <div class="header-rule" aria-hidden="true"></div>
  </header>
  {{ content }}
  <script>window.baseurl = "{{ site.baseurl }}";</script>
  <script src="{{ site.baseurl }}/assets/js/app.js"></script>
</body>
</html>
